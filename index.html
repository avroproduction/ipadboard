<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- iOS PWA settings for true Fullscreen App Experience -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Viewport settings specifically prevent pinch-zooming and scrolling on old iPads -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Digital Whiteboard</title>
    <style>
        /* CSS Reset to prevent any scrolling or overflow */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Prevent text selection while drawing */
            -webkit-user-select: none;
            user-select: none;
        }

        /* Grid Feature */
        body.grid-mode {
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Dark Mode Blackboard Feature */
        body.dark-mode {
            background-color: #222222;
        }
        body.dark-mode.grid-mode {
            background-image: linear-gradient(#3a3a3a 1px, transparent 1px), linear-gradient(90deg, #3a3a3a 1px, transparent 1px);
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            background: transparent; /* Canvas is transparent, body shows through */
        }

        /* Zen Mode Button (Now a compact floating circular icon) */
        #btn-zen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 122, 255, 0.7); /* Slightly transparent so it doesn't block view */
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px; /* Made smaller */
            height: 44px; /* Made smaller */
            font-size: 20px; /* Made smaller */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        #btn-zen:active {
            background: rgba(0, 122, 255, 1);
        }

        /* Floating toolbar */
        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            background: rgba(240, 240, 240, 0.95);
            padding: 8px 10px; /* Made slightly tighter */
            border-radius: 35px; /* Compact Pill shape */
            display: flex;
            flex-direction: row; /* FORCE SINGLE LINE */
            flex-wrap: wrap; /* Wrap only if screen is extremely narrow */
            gap: 6px;
            align-items: center;
            border: 1px solid #ccc;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 50;
            max-width: 96vw;
            justify-content: center;
        }

        /* Vertical Toolbar Mode */
        #toolbar.vertical {
            flex-direction: column;
            border-radius: 24px;
            width: 76px; /* Restrict width to keep it compact */
        }

        .dark-mode #toolbar {
            background: rgba(40, 40, 40, 0.95);
            border-color: #555;
        }

        #toolbar.hidden {
            display: none; /* Changed from heavy transforms to display:none to save rendering memory */
        }

        /* Drag handle for moving toolbar */
        #drag-handle {
            cursor: move;
            font-size: 24px;
            color: #888;
            padding: 0 4px;
            touch-action: none; /* Prevent scrolling when dragging */
            display: flex;
            align-items: center;
        }

        #toolbar.vertical #drag-handle {
            -webkit-transform: rotate(90deg);
            transform: rotate(90deg);
        }

        .tool-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        #toolbar.vertical .tool-group {
            flex-direction: column;
        }

        #toolbar.vertical #color-palette {
            flex-direction: row;
            flex-wrap: wrap;
            width: 68px; /* Forces a 2x3 grid of colors */
            justify-content: center;
        }

        /* Adjusted touch targets for compact 1-line fit */
        button {
            padding: 6px; /* Smaller */
            font-size: 18px; /* Smaller */
            font-weight: normal;
            border: 1px solid #bbb;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            min-width: 36px; /* Smaller */
            min-height: 36px; /* Smaller */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-mode button {
            background: #333;
            color: #fff;
            border-color: #555;
        }

        button:active {
            background: #e0e0e0;
        }
        .dark-mode button:active {
            background: #555;
        }

        button.active {
            background: #007aff;
            color: white;
            border-color: #005bb5;
        }

        /* Color Palette - slightly smaller to fit 1 line */
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-swatch.active {
            border-color: #007aff;
            -webkit-transform: scale(1.1);
            transform: scale(1.1);
        }

        .divider {
            width: 1px;
            height: 28px;
            background: #ccc;
            margin: 0 3px;
        }
        
        #toolbar.vertical .divider {
            width: 40px;
            height: 1px;
            margin: 4px 0;
        }
        
        .dark-mode .divider { background: #555; }

        #thickness {
            width: 70px; /* Narrower to fit 1 line */
        }

        /* Save Modal for old iPads (Tap and hold to save) */
        #save-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: center;
            padding-top: 50px;
        }

        #save-modal p {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #save-img {
            max-width: 90%;
            max-height: 70%;
            background: white;
            border: 2px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #close-modal {
            margin-top: 20px;
            background: #ff3b30;
            color: white;
            border: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            #toolbar {
                width: 95%;
                bottom: 10px;
                padding: 6px;
            }
            #btn-zen {
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Main Drawing Surface -->
    <canvas id="canvas"></canvas>

    <!-- Zen Mode Toggle (Circular Icon) -->
    <button id="btn-zen" title="Toggle Toolbar">&#x1F441;</button>

    <!-- Controls -->
    <div id="toolbar">
        <!-- Drag Handle to move toolbar -->
        <div id="drag-handle" title="Drag to move">&#x28FF;</div>

        <!-- Toolbar Orientation Switch Button -->
        <button id="btn-orient" class="tool-btn" title="Rotate Toolbar">&#x21BB;</button>

        <div class="tool-group">
            <button id="btn-pen" class="tool-btn active" title="Pen">&#x270E;</button>
            <button id="btn-highlighter" class="tool-btn" title="Highlighter">&#x1F58C;</button>
            <button id="btn-eraser" class="tool-btn" title="Eraser">&#x25B1;</button>
        </div>

        <div class="divider"></div>
        <input type="range" id="thickness" min="1" max="30" value="4">
        <div class="divider"></div>

        <div class="tool-group" id="color-palette">
            <div class="color-swatch active" style="background-color: #000000;" data-color="#000000"></div>
            <div class="color-swatch" style="background-color: #ff3b30;" data-color="#ff3b30"></div>
            <div class="color-swatch" style="background-color: #ff9500;" data-color="#ff9500"></div>
            <div class="color-swatch" style="background-color: #4cd964;" data-color="#4cd964"></div>
            <div class="color-swatch" style="background-color: #007aff;" data-color="#007aff"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
        </div>

        <div class="divider"></div>

        <div class="tool-group">
            <button id="btn-grid" title="Toggle Grid">&#x25A6;</button>
            <button id="btn-dark" title="Dark Mode">&#x25D0;</button>
            <button id="btn-clear" title="Clear Canvas">&#x1F5D1;</button>
            <button id="btn-save" title="Save Image">&#x1F4BE;</button>
        </div>
    </div>

    <!-- Modal for saving on old iOS -->
    <div id="save-modal">
        <p>Tap and hold the image below to save it.</p>
        <img id="save-img" alt="Saved Whiteboard">
        <br>
        <button id="close-modal">Close</button>
    </div>

    <script>
        // Using var instead of let/const for maximum compatibility with iOS 9 Safari (iPad 3)
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        
        var isDrawing = false;
        var lastX = 0;
        var lastY = 0;
        var currentTool = 'pen'; // 'pen', 'highlighter', or 'eraser'
        var strokeColor = '#000000'; // Default black

        // UI Elements
        var btnPen = document.getElementById('btn-pen');
        var btnHighlighter = document.getElementById('btn-highlighter');
        var btnEraser = document.getElementById('btn-eraser');
        var btnGrid = document.getElementById('btn-grid');
        var btnDark = document.getElementById('btn-dark');
        var btnClear = document.getElementById('btn-clear');
        var btnSave = document.getElementById('btn-save');
        var btnZen = document.getElementById('btn-zen');
        var btnOrient = document.getElementById('btn-orient');
        var toolbar = document.getElementById('toolbar');
        var sliderThickness = document.getElementById('thickness');
        var saveModal = document.getElementById('save-modal');
        var saveImg = document.getElementById('save-img');
        var btnCloseModal = document.getElementById('close-modal');
        var colorSwatches = document.querySelectorAll('.color-swatch');

        // Toolbar Drag Logic
        var dragHandle = document.getElementById('drag-handle');
        var isDraggingToolbar = false;
        var dragOffsetX = 0;
        var dragOffsetY = 0;

        function startToolbarDrag(e) {
            isDraggingToolbar = true;
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            var rect = toolbar.getBoundingClientRect();
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            
            // Remove centering transform so absolute positioning maps 1:1
            toolbar.style.transform = 'none';
            toolbar.style.webkitTransform = 'none';
            
            e.preventDefault(); // Stop canvas drawing from triggering
        }

        function moveToolbar(e) {
            if (!isDraggingToolbar) return;
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            var newLeft = clientX - dragOffsetX;
            var newTop = clientY - dragOffsetY;
            
            // Keep completely on-screen
            newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - toolbar.offsetWidth));
            newTop = Math.max(0, Math.min(newTop, window.innerHeight - toolbar.offsetHeight));
            
            toolbar.style.left = newLeft + 'px';
            toolbar.style.top = newTop + 'px';
            toolbar.style.bottom = 'auto'; // Disable CSS bottom pin
            
            e.preventDefault();
        }

        function stopToolbarDrag() {
            isDraggingToolbar = false;
        }

        // Attach drag events safely for iPad
        dragHandle.addEventListener('mousedown', startToolbarDrag, false);
        document.addEventListener('mousemove', moveToolbar, {passive: false});
        document.addEventListener('mouseup', stopToolbarDrag, false);

        dragHandle.addEventListener('touchstart', startToolbarDrag, {passive: false});
        document.addEventListener('touchmove', moveToolbar, {passive: false});
        document.addEventListener('touchend', stopToolbarDrag, false);

        // Setup Canvas Size and Retina Display Scaling
        function resizeCanvas() {
            var ratio = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * ratio;
            canvas.height = window.innerHeight * ratio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            ctx.scale(ratio, ratio);
            
            // Canvas remains transparent so body background (grid/dark) shows through
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        // Initialize size
        resizeCanvas();
        
        // Handle rotation/resizing
        window.addEventListener('resize', function() {
            // Lightweight canvas copy instead of heavy base64 toDataURL strings
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
            
            resizeCanvas();
            ctx.drawImage(tempCanvas, 0, 0);
        }, false);

        // --- Drawing Logic ---

        function getCoordinates(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDrawing(e) {
            isDrawing = true;
            var coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            
            ctx.beginPath();
            ctx.arc(lastX, lastY, sliderThickness.value / 2, 0, Math.PI * 2);
            
            // Handle tool types
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0,0,0,1)';
            } else if (currentTool === 'highlighter') {
                ctx.globalCompositeOperation = 'source-over';
                // Convert hex to rgba for highlighter opacity
                ctx.fillStyle = getHighlighterColor(strokeColor);
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = strokeColor;
            }
            
            ctx.fill();
            ctx.closePath();
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            var coords = getCoordinates(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else if (currentTool === 'highlighter') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = getHighlighterColor(strokeColor);
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = strokeColor;
            }

            ctx.lineWidth = sliderThickness.value;
            ctx.stroke();
            
            lastX = coords.x;
            lastY = coords.y;
            e.preventDefault();
        }

        function stopDrawing(e) {
            isDrawing = false;
        }

        function getHighlighterColor(hex) {
            // Very simple hex to rgba conversion for iPad 3
            var r = parseInt(hex.slice(1, 3), 16) || 255;
            var g = parseInt(hex.slice(3, 5), 16) || 255;
            var b = parseInt(hex.slice(5, 7), 16) || 0;
            return 'rgba(' + r + ',' + g + ',' + b + ', 0.3)';
        }

        // Event Listeners for Touch (iPad)
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing, false);
        canvas.addEventListener('touchcancel', stopDrawing, false);

        // Event Listeners for Mouse (Desktop testing)
        canvas.addEventListener('mousedown', startDrawing, false);
        canvas.addEventListener('mousemove', draw, false);
        canvas.addEventListener('mouseup', stopDrawing, false);
        canvas.addEventListener('mouseout', stopDrawing, false);

        // --- Toolbar Actions ---
        
        function updateToolButtons(activeBtn) {
            btnPen.className = 'tool-btn';
            btnHighlighter.className = 'tool-btn';
            btnEraser.className = 'tool-btn';
            activeBtn.className = 'tool-btn active';
        }

        btnPen.addEventListener('click', function() {
            currentTool = 'pen';
            updateToolButtons(btnPen);
        }, false);

        btnHighlighter.addEventListener('click', function() {
            currentTool = 'highlighter';
            updateToolButtons(btnHighlighter);
        }, false);

        btnEraser.addEventListener('click', function() {
            currentTool = 'eraser';
            updateToolButtons(btnEraser);
        }, false);

        // Colors
        for (var i = 0; i < colorSwatches.length; i++) {
            colorSwatches[i].addEventListener('click', function(e) {
                // Remove active from all
                for (var j = 0; j < colorSwatches.length; j++) {
                    colorSwatches[j].className = 'color-swatch';
                }
                // Add active to clicked
                e.target.className = 'color-swatch active';
                strokeColor = e.target.getAttribute('data-color');
                
                // Switch to pen automatically if color is picked
                if (currentTool === 'eraser') {
                    currentTool = 'pen';
                    updateToolButtons(btnPen);
                }
            }, false);
        }

        // Grid Toggle
        btnGrid.addEventListener('click', function() {
            document.body.classList.toggle('grid-mode');
            btnGrid.className = document.body.classList.contains('grid-mode') ? 'active' : '';
        }, false);

        // Toolbar Orientation Toggle
        btnOrient.addEventListener('click', function() {
            toolbar.classList.toggle('vertical');
        }, false);

        // Dark Mode Toggle
        btnDark.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            btnDark.className = document.body.classList.contains('dark-mode') ? 'active' : '';
        }, false);

        // Clear
        btnClear.addEventListener('click', function() {
            if (confirm('Clear the entire whiteboard?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }, false);

        // Zen Mode
        btnZen.addEventListener('click', function() {
            toolbar.classList.toggle('hidden');
            if (toolbar.classList.contains('hidden')) {
                btnZen.innerHTML = '&#x1F6E0;'; // Tool icon when hidden
                btnZen.style.opacity = '0.5';
            } else {
                btnZen.innerHTML = '&#x1F441;'; // Eye icon when visible
                btnZen.style.opacity = '1';
            }
        }, false);

        // Old iPad Save Handling (Fast & Lightweight)
        btnSave.addEventListener('click', function() {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            var tCtx = tempCanvas.getContext('2d');
            
            // Fill background based on mode
            tCtx.fillStyle = document.body.classList.contains('dark-mode') ? '#222222' : '#ffffff';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            // Draw actual strokes
            tCtx.drawImage(canvas, 0, 0);

            // Generate Image Data (JPEG 0.8 is much lighter on RAM)
            var dataURL = tempCanvas.toDataURL('image/jpeg', 0.8);
            saveImg.src = dataURL;
            saveModal.style.display = 'block';
        }, false);

        btnCloseModal.addEventListener('click', function() {
            saveModal.style.display = 'none';
        }, false);

    </script>
</body>
</html>
