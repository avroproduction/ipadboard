<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- iOS PWA settings for true Fullscreen App Experience -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Viewport settings specifically prevent pinch-zooming and scrolling on old iPads -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Digital Whiteboard</title>
    <style>
        /* CSS Reset to prevent any scrolling or overflow */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Prevent text selection while drawing */
            -webkit-user-select: none;
            user-select: none;
            transition: background-color 0.3s ease;
        }

        /* Grid Feature */
        body.grid-mode {
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Dark Mode Blackboard Feature */
        body.dark-mode {
            background-color: #222222;
        }
        body.dark-mode.grid-mode {
            background-image: linear-gradient(#3a3a3a 1px, transparent 1px), linear-gradient(90deg, #3a3a3a 1px, transparent 1px);
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            background: transparent; /* Canvas is transparent, body shows through */
        }

        /* Zen Mode Button */
        #btn-zen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* Floating toolbar */
        #toolbar {
            position: absolute;
            bottom: 80px; /* Shifted up to avoid Zen button */
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            background: rgba(240, 240, 240, 0.95);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            border: 1px solid #ccc;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .dark-mode #toolbar {
            background: rgba(40, 40, 40, 0.95);
            border-color: #555;
        }

        #toolbar.hidden {
            opacity: 0;
            transform: translateY(150%) translateX(-50%);
            pointer-events: none;
        }

        .tool-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Large touch targets for iPad fingers */
        button {
            padding: 12px 18px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #bbb;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .dark-mode button {
            background: #333;
            color: #fff;
            border-color: #555;
        }

        button:active {
            background: #e0e0e0;
        }
        .dark-mode button:active {
            background: #555;
        }

        button.active {
            background: #007aff;
            color: white;
            border-color: #005bb5;
        }

        /* Color Palette */
        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .color-swatch.active {
            border-color: #007aff;
            -webkit-transform: scale(1.1);
            transform: scale(1.1);
        }

        .divider {
            width: 1px;
            height: 30px;
            background: #ccc;
            margin: 0 5px;
        }
        .dark-mode .divider { background: #555; }

        #thickness {
            width: 120px;
        }

        /* Save Modal for old iPads (Tap and hold to save) */
        #save-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: center;
            padding-top: 50px;
        }

        #save-modal p {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #save-img {
            max-width: 90%;
            max-height: 70%;
            background: white;
            border: 2px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #close-modal {
            margin-top: 20px;
            background: #ff3b30;
            color: white;
            border: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            #toolbar {
                width: 95%;
                bottom: 80px;
            }
            #btn-zen {
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Main Drawing Surface -->
    <canvas id="canvas"></canvas>

    <!-- Zen Mode Toggle -->
    <button id="btn-zen">👁 Hide Tools</button>

    <!-- Controls -->
    <div id="toolbar">
        <!-- Row 1: Main Tools -->
        <div class="tool-row">
            <button id="btn-pen" class="tool-btn active">Pen</button>
            <button id="btn-highlighter" class="tool-btn">Highlight</button>
            <button id="btn-eraser" class="tool-btn">Eraser</button>
            <div class="divider"></div>
            <input type="range" id="thickness" min="1" max="30" value="4">
        </div>

        <!-- Row 2: Color Palette -->
        <div class="tool-row" id="color-palette">
            <div class="color-swatch active" style="background-color: #000000;" data-color="#000000"></div>
            <div class="color-swatch" style="background-color: #ff3b30;" data-color="#ff3b30"></div>
            <div class="color-swatch" style="background-color: #ff9500;" data-color="#ff9500"></div>
            <div class="color-swatch" style="background-color: #4cd964;" data-color="#4cd964"></div>
            <div class="color-swatch" style="background-color: #007aff;" data-color="#007aff"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
        </div>

        <!-- Row 3: Actions -->
        <div class="tool-row">
            <button id="btn-undo">Undo</button>
            <button id="btn-grid">Grid</button>
            <button id="btn-dark">Dark</button>
            <div class="divider"></div>
            <button id="btn-fullscreen">Full</button>
            <button id="btn-clear">Clear</button>
            <button id="btn-save">Save</button>
        </div>
    </div>

    <!-- Modal for saving on old iOS -->
    <div id="save-modal">
        <p>Tap and hold the image below to save it.</p>
        <img id="save-img" alt="Saved Whiteboard">
        <br>
        <button id="close-modal">Close</button>
    </div>

    <script>
        // Using var instead of let/const for maximum compatibility with iOS 9 Safari (iPad 3)
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        
        var isDrawing = false;
        var lastX = 0;
        var lastY = 0;
        var currentTool = 'pen'; // 'pen', 'highlighter', or 'eraser'
        var strokeColor = '#000000'; // Default black
        
        // Undo Stack Feature (Limit to 5 to save iPad memory)
        var undoStack = [];
        var MAX_UNDO = 5;

        // UI Elements
        var btnPen = document.getElementById('btn-pen');
        var btnHighlighter = document.getElementById('btn-highlighter');
        var btnEraser = document.getElementById('btn-eraser');
        var btnUndo = document.getElementById('btn-undo');
        var btnGrid = document.getElementById('btn-grid');
        var btnDark = document.getElementById('btn-dark');
        var btnClear = document.getElementById('btn-clear');
        var btnSave = document.getElementById('btn-save');
        var btnFullscreen = document.getElementById('btn-fullscreen');
        var btnZen = document.getElementById('btn-zen');
        var toolbar = document.getElementById('toolbar');
        var sliderThickness = document.getElementById('thickness');
        var saveModal = document.getElementById('save-modal');
        var saveImg = document.getElementById('save-img');
        var btnCloseModal = document.getElementById('close-modal');
        var colorSwatches = document.querySelectorAll('.color-swatch');

        // Setup Canvas Size and Retina Display Scaling
        function resizeCanvas() {
            var ratio = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * ratio;
            canvas.height = window.innerHeight * ratio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            ctx.scale(ratio, ratio);
            
            // Canvas remains transparent so body background (grid/dark) shows through
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        // Initialize size
        resizeCanvas();
        
        // Handle rotation/resizing
        window.addEventListener('resize', function() {
            var tempImageData = canvas.toDataURL();
            resizeCanvas();
            var img = new Image();
            img.onload = function() {
                var ratio = window.devicePixelRatio || 1;
                ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
            };
            img.src = tempImageData;
        }, false);

        // --- State Management ---
        function saveState() {
            if (undoStack.length >= MAX_UNDO) {
                undoStack.shift();
            }
            // Save transparent canvas state
            undoStack.push(canvas.toDataURL('image/png'));
        }

        // --- Drawing Logic ---

        function getCoordinates(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDrawing(e) {
            isDrawing = true;
            saveState(); // Save before stroke starts
            var coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            
            ctx.beginPath();
            ctx.arc(lastX, lastY, sliderThickness.value / 2, 0, Math.PI * 2);
            
            // Handle tool types
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0,0,0,1)';
            } else if (currentTool === 'highlighter') {
                ctx.globalCompositeOperation = 'source-over';
                // Convert hex to rgba for highlighter opacity
                ctx.fillStyle = getHighlighterColor(strokeColor);
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = strokeColor;
            }
            
            ctx.fill();
            ctx.closePath();
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            var coords = getCoordinates(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else if (currentTool === 'highlighter') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = getHighlighterColor(strokeColor);
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = strokeColor;
            }

            ctx.lineWidth = sliderThickness.value;
            ctx.stroke();
            
            lastX = coords.x;
            lastY = coords.y;
            e.preventDefault();
        }

        function stopDrawing(e) {
            isDrawing = false;
        }

        function getHighlighterColor(hex) {
            // Very simple hex to rgba conversion for iPad 3
            var r = parseInt(hex.slice(1, 3), 16) || 255;
            var g = parseInt(hex.slice(3, 5), 16) || 255;
            var b = parseInt(hex.slice(5, 7), 16) || 0;
            return 'rgba(' + r + ',' + g + ',' + b + ', 0.3)';
        }

        // Event Listeners for Touch (iPad)
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing, false);
        canvas.addEventListener('touchcancel', stopDrawing, false);

        // Event Listeners for Mouse (Desktop testing)
        canvas.addEventListener('mousedown', startDrawing, false);
        canvas.addEventListener('mousemove', draw, false);
        canvas.addEventListener('mouseup', stopDrawing, false);
        canvas.addEventListener('mouseout', stopDrawing, false);

        // --- Toolbar Actions ---
        
        function updateToolButtons(activeBtn) {
            btnPen.className = 'tool-btn';
            btnHighlighter.className = 'tool-btn';
            btnEraser.className = 'tool-btn';
            activeBtn.className = 'tool-btn active';
        }

        btnPen.addEventListener('click', function() {
            currentTool = 'pen';
            updateToolButtons(btnPen);
        }, false);

        btnHighlighter.addEventListener('click', function() {
            currentTool = 'highlighter';
            updateToolButtons(btnHighlighter);
        }, false);

        btnEraser.addEventListener('click', function() {
            currentTool = 'eraser';
            updateToolButtons(btnEraser);
        }, false);

        // Colors
        for (var i = 0; i < colorSwatches.length; i++) {
            colorSwatches[i].addEventListener('click', function(e) {
                // Remove active from all
                for (var j = 0; j < colorSwatches.length; j++) {
                    colorSwatches[j].className = 'color-swatch';
                }
                // Add active to clicked
                e.target.className = 'color-swatch active';
                strokeColor = e.target.getAttribute('data-color');
                
                // Switch to pen automatically if color is picked
                if (currentTool === 'eraser') {
                    currentTool = 'pen';
                    updateToolButtons(btnPen);
                }
            }, false);
        }

        // Undo
        btnUndo.addEventListener('click', function() {
            if (undoStack.length > 0) {
                var imgData = undoStack.pop();
                var img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
                };
                img.src = imgData;
            }
        }, false);

        // Grid Toggle
        btnGrid.addEventListener('click', function() {
            document.body.classList.toggle('grid-mode');
            btnGrid.className = document.body.classList.contains('grid-mode') ? 'active' : '';
        }, false);

        // Dark Mode Toggle
        btnDark.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            btnDark.className = document.body.classList.contains('dark-mode') ? 'active' : '';
        }, false);

        // Clear
        btnClear.addEventListener('click', function() {
            if (confirm('Clear the entire whiteboard?')) {
                saveState();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }, false);

        // Zen Mode
        btnZen.addEventListener('click', function() {
            toolbar.classList.toggle('hidden');
            if (toolbar.classList.contains('hidden')) {
                btnZen.innerText = '🛠 Show Tools';
                btnZen.style.opacity = '0.5';
            } else {
                btnZen.innerText = '👁 Hide Tools';
                btnZen.style.opacity = '1';
            }
        }, false);

        // Old iPad Save Handling (Merging Background and Canvas)
        btnSave.addEventListener('click', function() {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            var tCtx = tempCanvas.getContext('2d');
            
            // Fill background based on mode
            tCtx.fillStyle = document.body.classList.contains('dark-mode') ? '#222222' : '#ffffff';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            // Draw grid if active
            if (document.body.classList.contains('grid-mode')) {
                tCtx.strokeStyle = document.body.classList.contains('dark-mode') ? '#3a3a3a' : '#e0e0e0';
                tCtx.lineWidth = 1 * (window.devicePixelRatio || 1);
                var step = 40 * (window.devicePixelRatio || 1);
                
                tCtx.beginPath();
                for (var x = 0; x <= tempCanvas.width; x += step) {
                    tCtx.moveTo(x, 0); tCtx.lineTo(x, tempCanvas.height);
                }
                for (var y = 0; y <= tempCanvas.height; y += step) {
                    tCtx.moveTo(0, y); tCtx.lineTo(tempCanvas.width, y);
                }
                tCtx.stroke();
            }
            
            // Draw actual strokes
            tCtx.drawImage(canvas, 0, 0);

            // Generate Image Data
            var dataURL = tempCanvas.toDataURL('image/jpeg', 0.9);
            saveImg.src = dataURL;
            saveModal.style.display = 'block';
        }, false);

        btnCloseModal.addEventListener('click', function() {
            saveModal.style.display = 'none';
        }, false);

        // Fullscreen Toggle
        btnFullscreen.addEventListener('click', function() {
            var doc = window.document;
            var docEl = doc.documentElement;

            // Vendor prefixed methods for older browsers
            var requestFullScreen = docEl.requestFullscreen || docEl.webkitRequestFullScreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            var cancelFullScreen = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;

            // Check if we are currently in fullscreen
            var isFullscreen = doc.fullscreenElement || doc.webkitFullscreenElement || doc.mozFullScreenElement || doc.msFullscreenElement;

            if (!isFullscreen) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl);
                } else {
                    alert("Your iPad's browser doesn't support the fullscreen API. Pro-tip: Tap the 'Share' icon in Safari and select 'Add to Home Screen' for a true fullscreen app experience!");
                }
            } else {
                if (cancelFullScreen) {
                    cancelFullScreen.call(doc);
                }
            }
        }, false);

    </script>
</body>
</html>
